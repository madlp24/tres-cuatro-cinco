<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galería | Tres Cuatro Cinco steakhouse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="top-strip">
        <div class="top-strip-inner">
          <span><strong>Dirección:</strong> Calle 69A # 5-81, Chapinero, Bogotá</span>
          <span><strong>Reservas:</strong> +57 323 238 4660</span>
        </div>
      </div>

      <header class="topbar">
        <div class="topbar-inner">
          <a class="brand" href="index.html">
            <img class="brand-logo is-hidden" src="assets/images/logo.png" alt="Logo de Tres Cuatro Cinco" data-brand-logo />
            <span class="brand-wordmark" data-brand-wordmark><strong>TRES CUATRO CINCO</strong><span>steakhouse</span></span>
          </a>
          <button class="menu-toggle" type="button" aria-expanded="false">Menú</button>
          <nav class="nav-links">
            <a href="index.html">Inicio</a>
            <a class="active" href="galeria.html">Galería</a>
            <a href="#" data-menu-link>Menú</a>
            <a href="contacto.html">Contacto</a>
            <a class="button" href="#" data-reservation-link>Reservar</a>
          </nav>
        </div>
      </header>

      <main class="hero">
        <p class="eyebrow">Fotografía</p>
        <h1 class="section-title">Una galería con más aire y más protagonismo.</h1>
      </main>

      <section class="page-section hero">
        <div class="gallery-grid">
          <figure class="gallery-card tall"><img src="assets/images/img-11.jpg" alt="Plato principal" /></figure>
          <figure class="gallery-card"><img src="assets/images/img-10.jpg" alt="Detalle gastronómico" /></figure>
          <figure class="gallery-card"><img src="assets/images/img-13.jpg" alt="Presentación del producto" /></figure>
          <figure class="gallery-card wide"><img src="assets/images/img-17.jpg" alt="Experiencia gastronómica" /></figure>
          <figure class="gallery-card"><img src="assets/images/img-03.jpg" alt="Preparación culinaria" /></figure>
          <figure class="gallery-card"><img src="assets/images/img-06.jpg" alt="Fuego y técnica" /></figure>
          <figure class="gallery-card wide"><img src="assets/images/img-15.jpg" alt="Emplatado de Tres Cuatro Cinco" /></figure>
        </div>
      </section>

      <footer class="site-footer">
        <div class="footer-grid">
          <div class="footer-panel">
            <p class="mini-title">Menú</p>
            <p><a href="#" data-menu-link>Ir al menú</a></p>
          </div>
          <div class="footer-panel">
            <p class="mini-title">Contacto</p>
            <p><a href="contacto.html">Ubicación, mapa y reservas</a></p>
          </div>
        </div>
      </footer>
    </div>
    <script src="script.js"></script>
  </body>
</html>
